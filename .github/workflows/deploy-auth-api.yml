name: Deploy Authentication API to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'FreshNoodle.API.Authentication/**'
      - 'FreshNoodle.Core/**'
      - 'FreshNoodle.Infrastructure/**'
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'FreshNoodle.API.Authentication/FreshNoodle.API.Authentication.csproj'
  AZURE_APP_NAME: 'freshnoodle-auth-api' # TODO: Replace with your actual Azure App Service name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./publish/auth-api

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_AUTH_API_PUBLISH_PROFILE }}
          package: ./publish/auth-api
